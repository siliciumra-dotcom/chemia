<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juegos B1</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,#eef6ff,#fff7ed);
    color:#1f2937;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:50px 20px;
}

h1{
    text-align:center;
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:45px;
    font-size:18px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:28px;
}

.card{
    background:white;
    border-radius:24px;
    padding:30px;
    text-decoration:none;
    color:inherit;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.25s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(0,0,0,.12);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

.card h2{
    margin-bottom:12px;
}

.card p{
    color:#6b7280;
    line-height:1.5;
}

.back{
    margin-top:50px;
    text-align:center;
}

.back a{
    text-decoration:none;
    color:white;
    background:#2563eb;
    padding:14px 28px;
    border-radius:14px;
    display:inline-block;
    font-weight:700;
}

</style>

</head>

<body>

<div class="container">

<h1>🎮 Juegos B1</h1>

<p class="subtitle">
Material interactivo para practicar español.
</p>

<div class="grid">

<a class="card" href="juego_p/">
<div class="icon">🅿️</div>
<h2>El juego de la P</h2>

<p>
Explica una palabra utilizando únicamente palabras que empiecen por la letra <strong>P</strong>.
Ideal para practicar vocabulario y la expresión oral.
</p>

</a>

<!--
Aquí irán los próximos juegos.

<a class="card" href="flipcards/">
...
</a>

-->

</div>

<div class="back">
<a href="../">⬅ Volver al nivel B1</a>
</div>

</div>

</body>
</html>
