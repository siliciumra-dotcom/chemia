<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ruleta de preguntas</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');


*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{

margin:0;
min-height:100vh;

background:linear-gradient(135deg,#667eea,#764ba2);

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}



.app{

width:100%;
max-width:1200px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border-radius:30px;

padding:30px;

color:white;

}



h1{

text-align:center;

font-size:36px;

margin-bottom:30px;

}



.content{

display:grid;

grid-template-columns:330px 1fr;

gap:30px;

}



.panel{

background:white;

color:#333;

padding:25px;

border-radius:20px;

}



textarea{

width:100%;

height:100px;

resize:none;

padding:15px;

border-radius:15px;

border:1px solid #ddd;

font-size:15px;

}



button{

border:none;

cursor:pointer;

border-radius:50px;

padding:15px 25px;

font-size:16px;

font-weight:bold;

}



.add{

width:100%;

margin-top:15px;

background:#667eea;

color:white;

}



.list{

margin-top:20px;

max-height:250px;

overflow:auto;

}



.item{

background:#f1f1f1;

padding:10px;

border-radius:10px;

margin-bottom:8px;

}



.game{

display:flex;

flex-direction:column;

align-items:center;

}



.wheel-box{

position:relative;

}



canvas{

width:600px;

height:600px;

background:white;

border-radius:50%;

box-shadow:0 20px 50px rgba(0,0,0,.35);

}



.pointer{

position:absolute;

top:-35px;

left:50%;

transform:translateX(-50%);

font-size:55px;

z-index:10;

}



.spin{

margin-top:30px;

background:#ffdd59;

color:#333;

font-size:22px;

padding:18px 65px;

}



.result{

margin-top:25px;

background:white;

color:#333;

padding:25px;

border-radius:20px;

width:90%;

min-height:90px;

text-align:center;

font-size:22px;

}



@media(max-width:900px){

.content{

grid-template-columns:1fr;

}


canvas{

width:330px;

height:330px;

}

}



</style>


</head>


<body>



<div class="app">


<h1>🎡 Ruleta de preguntas</h1>



<div class="content">



<div class="panel">


<h2>Añadir pregunta</h2>



<textarea 
id="question"
placeholder="Escribe una pregunta...">
</textarea>



<button class="add" onclick="addQuestion()">

➕ Añadir pregunta

</button>



<div class="list" id="list"></div>



</div>




<div class="game">


<div class="wheel-box">


<div class="pointer">

▼

</div>



<canvas id="wheel" width="600" height="600"></canvas>


</div>



<button class="spin" onclick="spin()">

🎲 GIRAR

</button>



<div class="result" id="result">

La pregunta aparecerá aquí

</div>



</div>



</div>


</div>




<script>


let questions=[

"¿Cómo te llamas?",

"¿Dónde vives?",

"¿Qué haces si llueve?",

"¿Qué comida te gusta?"

];


let canvas=document.getElementById("wheel");

let ctx=canvas.getContext("2d");


let angle=0;

let spinning=false;





function drawWheel(){


ctx.clearRect(0,0,600,600);



let total=questions.length;



if(total===0)
return;



let slice=(Math.PI*2)/total;



for(let i=0;i<total;i++){



let start=angle+i*slice;

let end=start+slice;



ctx.beginPath();

ctx.moveTo(300,300);

ctx.arc(
300,
300,
300,
start,
end
);

ctx.closePath();


ctx.fillStyle=
`hsl(${i*360/total},75%,65%)`;

ctx.fill();





ctx.save();



ctx.translate(300,300);


ctx.rotate(start+slice/2);



ctx.fillStyle="#222";

ctx.textAlign="center";


let fontSize=18;


ctx.font=`bold ${fontSize}px Poppins`;



let words=questions[i].split(" ");

let lines=[];

let line="";



words.forEach(word=>{


if((line+word).length>18){

lines.push(line);

line=word+" ";

}

else{

line+=word+" ";

}


});


lines.push(line);



lines.forEach((txt,index)=>{


ctx.fillText(

txt.trim(),

165,

(index-(lines.length-1)/2)*24

);


});



ctx.restore();



}



// centro


ctx.beginPath();

ctx.arc(

300,

300,

55,

0,

Math.PI*2

);


ctx.fillStyle="white";

ctx.fill();



}






function addQuestion(){


let input=document.getElementById("question");


let text=input.value.trim();


if(text==="")
return;


questions.push(text);


input.value="";


updateList();

drawWheel();


}





function updateList(){


let list=document.getElementById("list");


list.innerHTML="";


questions.forEach((q,i)=>{


let div=document.createElement("div");


div.className="item";


div.innerHTML=(i+1)+". "+q;


list.appendChild(div);


});


}









function spin(){


if(spinning || questions.length===0)

return;


spinning=true;



let totalRotation =
(Math.random()*5+6)*Math.PI*2;



let startAngle=angle;

let endAngle=angle+totalRotation;



let duration=6000;

let startTime=null;



function animate(time){


if(!startTime)

startTime=time;



let progress=
(time-startTime)/duration;



if(progress<1){



let ease=
1-Math.pow(1-progress,4);



angle=
startAngle+
(endAngle-startAngle)*ease;



drawWheel();


requestAnimationFrame(animate);



}

else{



angle=endAngle;


drawWheel();





let normalized =
(angle%(Math.PI*2)+Math.PI*2)
%(Math.PI*2);



let slice =
(2*Math.PI)/questions.length;



let pointer =
3*Math.PI/2;



let relative =
(pointer-normalized+Math.PI*2)
%(Math.PI*2);



let index =
Math.floor(relative/slice);



if(index>=questions.length)

index=questions.length-1;



document.getElementById("result").innerHTML=

"💬 "+questions[index];



spinning=false;


}



}



requestAnimationFrame(animate);



}




drawWheel();

updateList();


</script>


</body>

</html>
