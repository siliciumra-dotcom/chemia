<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ruleta del condicional</title>

  <meta http-equiv="refresh" content="0; url=juego_ruleta_condicional.html">
  <link rel="canonical" href="juego_ruleta_condicional.html">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap");

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;

      display: grid;
      place-items: center;

      color: #ffffff;
      font-family: "Poppins", sans-serif;

      background:
        radial-gradient(
          circle at 15% 15%,
          rgba(255, 255, 255, 0.16),
          transparent 28%
        ),
        radial-gradient(
          circle at 85% 85%,
          rgba(255, 255, 255, 0.12),
          transparent 30%
        ),
        linear-gradient(135deg, #667eea, #764ba2);
    }

    .card {
      width: min(100%, 520px);
      padding: 36px 28px;

      text-align: center;

      color: #25283d;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;

      box-shadow: 0 22px 55px rgba(34, 38, 70, 0.24);
      backdrop-filter: blur(16px);
    }

    .icon {
      margin-bottom: 14px;
      font-size: 3rem;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 24px;
      color: #667085;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      padding: 13px 22px;

      color: #ffffff;
      background: #667eea;
      border-radius: 999px;

      text-decoration: none;
      font-weight: 700;

      box-shadow: 0 12px 26px rgba(102, 126, 234, 0.28);
      transition:
        transform 0.2s ease,
        background 0.2s ease;
    }

    a:hover {
      background: #5365d6;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <main class="card">
    <div class="icon" aria-hidden="true">🎡</div>

    <h1>Ruleta del condicional</h1>

    <p>
      El juego se está abriendo automáticamente.
    </p>

    <a href="juego_ruleta_condicional.html">
      Abrir el juego
      <span aria-hidden="true">→</span>
    </a>
  </main>

  <script>
    window.location.replace("juego_ruleta_condicional.html");
  </script>

</body>
</html>
