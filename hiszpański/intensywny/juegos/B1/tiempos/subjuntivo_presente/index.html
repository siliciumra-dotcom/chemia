<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Subjuntivo o indicativo</title>

  <meta http-equiv="refresh" content="0; url=subjuntivo_o_indicativo.html">
  <link rel="canonical" href="subjuntivo_o_indicativo.html">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1f2937;
      background:
        radial-gradient(circle at top left, rgba(249, 115, 22, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.18), transparent 32%),
        linear-gradient(135deg, #fff7ed, #eef6ff);
    }

    .card {
      width: min(520px, 100%);
      padding: 36px;
      box-sizing: border-box;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 20px 55px rgba(51, 65, 85, 0.16);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 5vw, 2.7rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 24px;
      color: #64748b;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 16px;
      color: white;
      text-decoration: none;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      box-shadow: 0 12px 26px rgba(124, 58, 237, 0.25);
    }

    a:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>¿Subjuntivo o indicativo?</h1>
    <p>El juego se está abriendo automáticamente.</p>
    <a href="subjuntivo_o_indicativo.html">Abrir el juego</a>
  </main>

  <script>
    window.location.replace("subjuntivo_o_indicativo.html");
  </script>
</body>
</html>
