<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué ves en el parque?</title>

<style>
body{
    margin:0;
    padding:30px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,#ecfdf5,#eef6ff);
    color:#1f2937;
}

.container{
    max-width:850px;
    margin:auto;
    text-align:center;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    color:#6b7280;
    margin-bottom:25px;
}

.task{
    background:white;
    padding:18px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    margin-bottom:20px;
    font-size:24px;
    font-weight:800;
}

.image-box{
    position:relative;
    display:inline-block;
    max-width:100%;
}

.image-box img{
    width:100%;
    border-radius:24px;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
}

.hotspot{
    position:absolute;
    border:3px solid transparent;
    border-radius:18px;
    cursor:pointer;
    transition:.2s;
}

.hotspot:hover{
    background:rgba(34,197,94,.25);
    border-color:#16a34a;
}

.hotspot.correct{
    background:rgba(34,197,94,.35);
    border-color:#16a34a;
}

.hotspot.wrong{
    background:rgba(239,68,68,.35);
    border-color:#dc2626;
}

.feedback{
    margin-top:20px;
    font-size:24px;
    font-weight:800;
}

.score{
    margin-top:10px;
    color:#6b7280;
    font-weight:700;
}

.buttons{
    margin-top:22px;
}

button{
    border:2px solid #1f2937;
    border-radius:14px;
    padding:12px 20px;
    font-size:16px;
    font-weight:800;
    background:white;
    cursor:pointer;
    box-shadow:0 4px 0 #1f2937;
}

.back{
    margin-top:25px;
}

.back a{
    text-decoration:none;
    color:#2563eb;
    font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<h1>🌳 ¿Qué ves en el parque?</h1>

<div class="subtitle">
Mira la imagen y haz clic en el objeto correcto.
</div>

<div class="task" id="task">
    Busca: el árbol
</div>

<div class="image-box">

<img src="parque.png" alt="El parque">

<!-- coordenadas aproximadas sobre el póster -->
<div class="hotspot" data-word="el árbol" style="left:7%; top:43%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="el banco" style="left:28%; top:43%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="la papelera" style="left:51%; top:43%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="la fuente" style="left:73%; top:43%; width:20%; height:10%;"></div>

<div class="hotspot" data-word="el césped" style="left:7%; top:55%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="la flor" style="left:28%; top:55%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="el lago" style="left:51%; top:55%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="el pato" style="left:73%; top:55%; width:20%; height:10%;"></div>

<div class="hotspot" data-word="el columpio" style="left:7%; top:67%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="el tobogán" style="left:28%; top:67%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="el parque infantil" style="left:51%; top:67%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="la pelota" style="left:73%; top:67%; width:20%; height:10%;"></div>

<div class="hotspot" data-word="el sendero" style="left:7%; top:79%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="la farola" style="left:28%; top:79%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="el arbusto" style="left:51%; top:79%; width:20%; height:10%;"></div>
<div class="hotspot" data-word="la mariposa" style="left:73%; top:79%; width:20%; height:10%;"></div>

</div>

<div class="feedback" id="feedback"></div>
<div class="score" id="score">Puntos: 0 / 16</div>

<div class="buttons">
    <button onclick="nextWord()">Siguiente palabra</button>
    <button onclick="resetGame()">Reiniciar</button>
</div>

<div class="back">
    <a href="index.html">⬅ Volver a El parque</a>
</div>

</div>

<script>
const words = [
"el árbol",
"el banco",
"la papelera",
"la fuente",
"el césped",
"la flor",
"el lago",
"el pato",
"el columpio",
"el tobogán",
"el parque infantil",
"la pelota",
"el sendero",
"la farola",
"el arbusto",
"la mariposa"
];

let current = 0;
let score = 0;
let answered = false;

function updateTask(){
    document.getElementById("task").textContent = "Busca: " + words[current];
    document.getElementById("feedback").textContent = "";
    answered = false;
}

function nextWord(){
    current = (current + 1) % words.length;
    updateTask();
}

function resetGame(){
    current = 0;
    score = 0;
    answered = false;
    document.querySelectorAll(".hotspot").forEach(h => {
        h.classList.remove("correct","wrong");
    });
    document.getElementById("score").textContent = "Puntos: 0 / 16";
    updateTask();
}

document.querySelectorAll(".hotspot").forEach(hotspot => {
    hotspot.addEventListener("click", () => {
        if(answered) return;

        const selected = hotspot.dataset.word;
        const correct = words[current];

        if(selected === correct){
            hotspot.classList.add("correct");
            document.getElementById("feedback").textContent = "✅ ¡Correcto!";
            score++;
            document.getElementById("score").textContent = "Puntos: " + score + " / 16";
            answered = true;
        }else{
            hotspot.classList.add("wrong");
            document.getElementById("feedback").textContent = "❌ Inténtalo otra vez.";
            setTimeout(() => hotspot.classList.remove("wrong"), 600);
        }
    });
});

updateTask();
</script>

</body>
</html>
