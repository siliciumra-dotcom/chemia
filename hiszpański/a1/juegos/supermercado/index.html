<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué ves en el supermercado?</title>

<style>
body{
    margin:0;
    padding:30px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,#fff7ed,#f7f9fc);
    color:#1f2937;
}
.container{max-width:650px;margin:auto;text-align:center}
h1{font-size:42px;margin-bottom:10px}
.subtitle{color:#6b7280;margin-bottom:20px}
.task{
    background:white;
    padding:18px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    margin-bottom:16px;
    font-size:26px;
    font-weight:900;
}
.score{
    margin-bottom:18px;
    font-size:20px;
    font-weight:800;
    color:#ea580c;
}
.image-box{position:relative;display:inline-block;width:100%}
.image-box img{
    width:100%;
    display:block;
    border-radius:24px;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
}
.hotspot{
    position:absolute;
    border:3px solid transparent;
    border-radius:16px;
    cursor:pointer;
    transition:.15s;
}
.hotspot:hover{
    background:rgba(249,115,22,.18);
    border-color:#f97316;
}
.hotspot.correct{
    background:rgba(34,197,94,.38);
    border-color:#16a34a;
    box-shadow:inset 0 0 18px rgba(22,163,74,.55);
    transform:scale(.95);
}
.hotspot.wrong{
    background:rgba(250,204,21,.30);
    border-color:#f59e0b;
}
.feedback{margin-top:18px;font-size:22px;font-weight:900}
.buttons{margin-top:22px}
button{
    border:2px solid #1f2937;
    border-radius:14px;
    padding:12px 20px;
    font-size:16px;
    font-weight:800;
    background:white;
    cursor:pointer;
    box-shadow:0 4px 0 #1f2937;
}
.back{margin-top:25px}
.back a{text-decoration:none;color:#2563eb;font-weight:700}
</style>
</head>

<body>

<div class="container">

<h1>🛒 ¿Qué ves en el supermercado?</h1>
<div class="subtitle">Haz clic en el producto correcto.</div>

<div class="task" id="task">Busca: el pan</div>
<div class="score" id="score">Puntos: 0 / 16</div>

<div class="image-box">

<img src="../../vocabulario/supermercado/supermercado.png" alt="El supermercado">

<!-- fila 1 -->
<div class="hotspot" data-word="el pan" style="left:3%; top:42%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="la leche" style="left:27%; top:42%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="los huevos" style="left:51%; top:42%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="el queso" style="left:75%; top:42%; width:22%; height:11%;"></div>

<!-- fila 2 -->
<div class="hotspot" data-word="la fruta" style="left:3%; top:55%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="la verdura" style="left:27%; top:55%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="el carne" style="left:51%; top:55%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="el pescado" style="left:75%; top:55%; width:22%; height:11%;"></div>

<!-- fila 3 -->
<div class="hotspot" data-word="el arroz" style="left:3%; top:68%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="la pasta" style="left:27%; top:68%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="el agua" style="left:51%; top:68%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="el zumo" style="left:75%; top:68%; width:22%; height:11%;"></div>

<!-- fila 4 -->
<div class="hotspot" data-word="el yogur" style="left:3%; top:81%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="el azúcar" style="left:27%; top:81%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="el aceite" style="left:51%; top:81%; width:23%; height:11%;"></div>
<div class="hotspot" data-word="el carrito" style="left:75%; top:81%; width:22%; height:11%;"></div>

</div>

<div class="feedback" id="feedback"></div>

<div class="buttons">
    <button onclick="resetGame()">Reiniciar</button>
</div>

<div class="back">
    <a href="index.html">⬅ Volver a El supermercado</a>
</div>

</div>

<script>
const words = [
"el pan",
"la leche",
"los huevos",
"el queso",
"la fruta",
"la verdura",
"el carne",
"el pescado",
"el arroz",
"la pasta",
"el agua",
"el zumo",
"el yogur",
"el azúcar",
"el aceite",
"el carrito"
];

let remaining = [...words];
let current = "";
let score = 0;

function chooseWord(){
    if(remaining.length === 0){
        document.getElementById("task").textContent = "🎉 ¡Juego terminado!";
        document.getElementById("feedback").textContent = "¡Muy bien!";
        return;
    }

    const randomIndex = Math.floor(Math.random() * remaining.length);
    current = remaining[randomIndex];
    document.getElementById("task").textContent = "Busca: " + current;
    document.getElementById("feedback").textContent = "";
}

function updateScore(){
    document.getElementById("score").textContent = "Puntos: " + score + " / 16";
}

function resetGame(){
    remaining = [...words];
    current = "";
    score = 0;

    document.querySelectorAll(".hotspot").forEach(h => {
        h.classList.remove("correct","wrong");
    });

    updateScore();
    chooseWord();
}

document.querySelectorAll(".hotspot").forEach(hotspot => {
    hotspot.addEventListener("click", () => {
        const selected = hotspot.dataset.word;

        if(selected === current){
            hotspot.classList.add("correct");
            score++;
            updateScore();
            remaining = remaining.filter(word => word !== current);
            document.getElementById("feedback").textContent = "✅ ¡Correcto!";

            setTimeout(() => {
                chooseWord();
            }, 650);
        }else{
            hotspot.classList.add("wrong");
            document.getElementById("feedback").textContent = "👀 Busca otra cosa.";

            setTimeout(() => {
                hotspot.classList.remove("wrong");
            }, 400);
        }
    });
});

resetGame();
</script>

</body>
</html>
