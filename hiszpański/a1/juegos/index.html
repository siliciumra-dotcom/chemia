<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A1 - Juegos</title>

<style>
body{
    margin:0;
    padding:40px 20px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,#fff7ed,#eef6ff);
    color:#1f2937;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:48px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:24px;
}

.card{
    display:block;
    background:white;
    padding:30px;
    border-radius:24px;
    text-decoration:none;
    color:inherit;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:48px;
    margin-bottom:12px;
}

.title{
    font-size:26px;
    font-weight:700;
    margin-bottom:10px;
}

.desc{
    color:#6b7280;
    line-height:1.5;
}

.back{
    text-align:center;
    margin-top:40px;
}

.back a{
    text-decoration:none;
    color:#2563eb;
    font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Juegos</h1>

<div class="subtitle">
Nivel A1
</div>

<div class="grid">

<a class="card" href="parque/">
    <div class="icon">🌳</div>
    <div class="title">¿Qué ves en el parque?</div>
    <div class="desc">
        Encuentra los objetos en la imagen del parque.
    </div>
</a>

<a class="card" href="ciudad/">
    <div class="icon">🏙️</div>
    <div class="title">¿Qué ves en la ciudad?</div>
    <div class="desc">
        Encuentra los lugares y objetos de la ciudad.
    </div>
</a>

<a class="card" href="supermercado/">
    <div class="icon">🛒</div>
    <div class="title">¿Qué ves en el supermercado?</div>
    <div class="desc">
        Encuentra los alimentos y productos del supermercado.
    </div>
</a>

</div>

<div class="back">
    <a href="../index.html">⬅ Volver a A1</a>
</div>

</div>

</body>
</html>
