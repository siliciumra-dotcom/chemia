<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiszpański</title>

<style>
body{
    margin:0;
    padding:40px 20px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,#fff7ed,#eef6ff);
    color:#1f2937;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:48px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:40px;
    font-size:18px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:24px;
}

.card{
    display:block;
    background:white;
    padding:30px;
    border-radius:24px;
    text-decoration:none;
    color:inherit;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:50px;
    margin-bottom:12px;
}

.title{
    font-size:28px;
    font-weight:700;
    margin-bottom:10px;
}

.desc{
    color:#6b7280;
    line-height:1.5;
}

.intensive{
    background:#fff7ed;
    border:3px solid #f97316;
}

.back{
    margin-top:40px;
    text-align:center;
}

.back a{
    text-decoration:none;
    color:#2563eb;
    font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<h1>🇪🇸 Español</h1>

<div class="subtitle">
Selecciona el nivel
</div>

<div class="grid">

<a class="card" href="a1/">
    <div class="icon">🌱</div>
    <div class="title">A1</div>
    <div class="desc">
        Primeros pasos en español.
    </div>
</a>

<a class="card" href="a2/">
    <div class="icon">🌿</div>
    <div class="title">A2</div>
    <div class="desc">
        Comunicación básica y situaciones cotidianas.
    </div>
</a>

<a class="card" href="b1/">
    <div class="icon">🌳</div>
    <div class="title">B1</div>
    <div class="desc">
        Conversación, opinión y narración.
    </div>
</a>

<a class="card" href="b2/">
    <div class="icon">🚀</div>
    <div class="title">B2</div>
    <div class="desc">
        Debate, argumentación y fluidez.
    </div>
</a>

<a class="card intensive" href="intensywny/">
    <div class="icon">🔥</div>
    <div class="title">Intensivo</div>
    <div class="desc">
        Materiales para cursos intensivos y repaso rápido.
    </div>
</a>

</div>

<div class="back">
    <a href="../index.html">⬅ Powrót do strony głównej</a>
</div>

</div>

</body>
</html>
