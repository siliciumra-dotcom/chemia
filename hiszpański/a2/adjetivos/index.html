<!DOCTYPE html>

<head>

<style>
body{

    padding:40px 20px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,#fff7ed,#eef6ff);
    color:#1f2937;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:42px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:35px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    display:block;
    background:white;
    padding:28px;
    border-radius:24px;
    text-decoration:none;
    color:inherit;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:42px;
    margin-bottom:10px;
}

.title{
    font-size:24px;
    font-weight:700;
    margin-bottom:10px;
}

.desc{
    color:#6b7280;
}

.back{
    margin-top:35px;

}

</head>
