<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caza de adjetivos</title>
<style>
:root{--dark:#0f172a;--muted:#64748b;--green:#22c55e}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:radial-gradient(circle at top left,rgba(250,204,21,.35),transparent 30%),radial-gradient(circle at bottom right,rgba(59,130,246,.35),transparent 35%),linear-gradient(135deg,#fff7ed,#eef6ff);color:var(--dark);padding:28px}
.app{max-width:1150px;margin:auto}
header{text-align:center;margin-bottom:24px}
h1{font-size:clamp(34px,5vw,58px);margin:0 0 8px}.subtitle{color:var(--muted);font-size:18px;margin:0}
.scoreboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:24px 0}
.team{background:white;border-radius:24px;padding:18px;box-shadow:0 10px 25px rgba(15,23,42,.08)}
.team h3{margin:0 0 10px;font-size:24px}.points{font-size:36px;font-weight:1000}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
button{border:0;border-radius:14px;padding:10px 14px;font-weight:900;cursor:pointer;background:#f8fafc;box-shadow:0 5px 14px rgba(15,23,42,.1);transition:.15s}
button:hover{transform:translateY(-2px)}
.main-card{background:rgba(255,255,255,.92);border-radius:32px;padding:26px;box-shadow:0 20px 50px rgba(15,23,42,.14)}
.level-title{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin:22px 0 14px}
.level-title h2{margin:0;font-size:28px}.badge{background:#dbeafe;color:#1d4ed8;padding:8px 14px;border-radius:999px;font-weight:900}
.tasks{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.task{background:white;border-radius:22px;padding:18px;box-shadow:0 8px 20px rgba(15,23,42,.06);border:2px solid transparent;transition:.15s}
.task.done{border-color:var(--green);background:#ecfdf5}.task h3{margin:0 0 10px;font-size:21px}.task p{margin:0 0 12px;color:var(--muted);line-height:1.4}
.easy{border-left:8px solid #86efac}.medium{border-left:8px solid #93c5fd}.hard{border-left:8px solid #facc15}.bonus{border-left:8px solid #fb7185}
.btn-reset{background:#fecaca}.footer{text-align:center;margin-top:24px}.back{text-align:center;margin-top:22px}.back a{color:#2563eb;font-weight:900;text-decoration:none}
</style>
</head>
<body>
<div class="app">
<header>
<h1>📸 Caza de adjetivos</h1>
<p class="subtitle">Juego A2 al aire libre: encuentra objetos, haz fotos y descríbelos en español.</p>
</header>

<section class="scoreboard">
<div class="team"><h3>Equipo A</h3><div class="points" id="scoreA">0</div><div class="controls"><button onclick="addPoints('A',1)">+1</button><button onclick="addPoints('A',2)">+2</button><button onclick="addPoints('A',3)">+3</button><button onclick="addPoints('A',-1)">-1</button></div></div>
<div class="team"><h3>Equipo B</h3><div class="points" id="scoreB">0</div><div class="controls"><button onclick="addPoints('B',1)">+1</button><button onclick="addPoints('B',2)">+2</button><button onclick="addPoints('B',3)">+3</button><button onclick="addPoints('B',-1)">-1</button></div></div>
<div class="team"><h3>Equipo C</h3><div class="points" id="scoreC">0</div><div class="controls"><button onclick="addPoints('C',1)">+1</button><button onclick="addPoints('C',2)">+2</button><button onclick="addPoints('C',3)">+3</button><button onclick="addPoints('C',-1)">-1</button></div></div>
</section>

<div class="main-card" id="tasksContainer"></div>

<div class="back"><a href="../index.html">⬅ Volver a Juegos</a></div>
</div>

<script>
const sections = [
{title:"⭐ Nivel 1 — Busca y describe", points:"1 punto", cls:"easy", items:[
["Algo grande","Es grande."],["Algo pequeño","Es pequeño."],["Algo bonito","Es bonito."],["Algo feo","Es feo."],["Algo limpio","Es limpio."],["Algo sucio","Es sucio."],["Algo moderno","Es moderno."],["Algo antiguo","Es antiguo."]
]},
{title:"⭐⭐ Nivel 2 — Explica por qué", points:"2 puntos", cls:"medium", items:[
["Algo tranquilo","Creo que es tranquilo porque..."],["Algo ruidoso","Creo que es ruidoso porque..."],["Algo interesante","Creo que es interesante porque..."],["Algo aburrido","Creo que es aburrido porque..."],["Algo útil","Creo que es útil porque..."],["Algo inútil","Creo que es inútil porque..."],["Algo peligroso","Creo que es peligroso porque..."],["Algo seguro","Creo que es seguro porque..."]
]},
{title:"⭐⭐⭐ Nivel 3 — Superlativos", points:"3 puntos", cls:"hard", items:[
["El lugar más bonito","Es el lugar más bonito de esta zona."],["El objeto más extraño","Es el objeto más extraño."],["El lugar más tranquilo","Es el lugar más tranquilo."],["El objeto más útil","Es el objeto más útil."],["El lugar más interesante","Es el lugar más interesante."]
]},
{title:"🔥 Bonus — Comparaciones", points:"3 puntos", cls:"bonus", items:[
["Más grande que un coche","Es más grande que un coche."],["Más pequeño que una mano","Es más pequeño que una mano."],["Feo pero útil","Es feo, pero es útil."],["Antiguo pero importante","Es antiguo, pero es importante."]
]}];

let scoreA=0, scoreB=0, scoreC=0;

function buildTasks(){
 const container=document.getElementById("tasksContainer");
 container.innerHTML="";
 sections.forEach(sec=>{
   container.innerHTML += `<div class="level-title"><h2>${sec.title}</h2><div class="badge">${sec.points}</div></div><div class="tasks">` +
   sec.items.map(item=>`<div class="task ${sec.cls}"><h3>${item[0]}</h3><p>${item[1]}</p><button onclick="toggleDone(this)">✔ Encontrado</button></div>`).join("") +
   `</div>`;
 });
 container.innerHTML += `<div class="footer"><button class="btn-reset" onclick="resetGame()">🔄 Reiniciar juego</button></div>`;
}

function addPoints(team, points){
 if(team==="A"){scoreA+=points;document.getElementById("scoreA").textContent=scoreA;}
 if(team==="B"){scoreB+=points;document.getElementById("scoreB").textContent=scoreB;}
 if(team==="C"){scoreC+=points;document.getElementById("scoreC").textContent=scoreC;}
}

function toggleDone(button){
 const card=button.closest(".task");
 card.classList.toggle("done");
 button.textContent=card.classList.contains("done") ? "✅ Encontrado" : "✔ Encontrado";
}

function resetGame(){
 scoreA=0; scoreB=0; scoreC=0;
 document.getElementById("scoreA").textContent="0";
 document.getElementById("scoreB").textContent="0";
 document.getElementById("scoreC").textContent="0";
 buildTasks();
}

buildTasks();
</script>
</body>
</html>
