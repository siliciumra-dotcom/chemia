<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tarjetas de tiempos verbales</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#f7efe5,#e7f0ff);min-height:100vh;color:#222;display:flex;justify-content:center;align-items:center;padding:24px}.app{width:min(900px,100%);text-align:center}h1{margin:0 0 8px;font-size:clamp(28px,5vw,48px)}.subtitle{margin:0 0 22px;color:#555}.card{background:rgba(255,255,255,.94);border:3px solid #222;border-radius:28px;min-height:360px;padding:36px;box-shadow:0 18px 40px rgba(0,0,0,.15);display:flex;flex-direction:column;justify-content:center;gap:22px;position:relative}.badge{align-self:center;padding:10px 18px;border-radius:999px;border:2px solid #222;font-weight:800;letter-spacing:.4px;background:#fff5c7}.prompt{font-size:clamp(28px,5vw,54px);font-weight:800}.task{font-size:clamp(22px,4vw,40px);line-height:1.2}.answer{display:none;font-size:clamp(24px,4vw,42px);font-weight:800;color:#0b6b3a;background:#e8fff1;border:2px dashed #0b6b3a;border-radius:18px;padding:18px}.answer.show{display:block}.counter{position:absolute;top:18px;right:22px;font-weight:700;color:#666}.controls{margin-top:22px;display:flex;flex-wrap:wrap;gap:12px;justify-content:center}button{border:2px solid #222;border-radius:14px;padding:13px 20px;font-size:17px;font-weight:800;cursor:pointer;background:white;box-shadow:0 4px 0 #222;transition:.12s}button:hover{transform:translateY(-2px);box-shadow:0 6px 0 #222}button:active{transform:translateY(2px);box-shadow:0 2px 0 #222}.primary{background:#ffe36d}.good{background:#bff4d2}.smallbar{margin-top:16px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}select{border:2px solid #222;border-radius:12px;padding:10px 14px;font-size:16px;background:white}.help{margin-top:18px;color:#555;font-size:15px}
</style>
</head>
<body>
<div class="app">
<h1>⏳ Tarjetas de tiempos verbales</h1>
<p class="subtitle">Pasa las tarjetas una a una. Primero responden oralmente; luego muestra la solución.</p>
<div class="smallbar"><select id="filter" onchange="setFilter()"><option value="TODOS">Todos los tiempos</option><option value="PRESENTE DEL INDICATIVO">Presente</option><option value="GERUNDIO">Gerundio</option><option value="PRETÉRITO PERFECTO">Pretérito perfecto</option><option value="PRETÉRITO INDEFINIDO">Pretérito indefinido</option><option value="FUTURO PRÓXIMO">Futuro próximo</option></select></div>
<div class="card"><div class="counter" id="counter"></div><div class="badge" id="tense"></div><div class="prompt" id="subject"></div><div class="task" id="task"></div><div class="answer" id="answer"></div></div>
<div class="controls"><button onclick="prevCard()">← Anterior</button><button class="good" onclick="toggleAnswer()">Mostrar / ocultar respuesta</button><button class="primary" onclick="nextCard()">Siguiente →</button><button onclick="shuffleCards()">Mezclar</button></div>
<p class="help">Atajos: ← / → para pasar tarjetas; espacio o Enter para mostrar la respuesta.</p>
</div>
<script>
const allCards = [
['PRESENTE DEL INDICATIVO','Yo','comprar ropa por internet','Compro ropa por internet.'],['PRESENTE DEL INDICATIVO','Tú','estudiar español','Estudias español.'],['PRESENTE DEL INDICATIVO','Ella','trabajar en una oficina','Trabaja en una oficina.'],['PRESENTE DEL INDICATIVO','Nosotros','viajar mucho','Viajamos mucho.'],['PRESENTE DEL INDICATIVO','Ellos','vivir en Madrid','Viven en Madrid.'],['PRESENTE DEL INDICATIVO','Yo','hacer deporte','Hago deporte.'],['PRESENTE DEL INDICATIVO','Tú','leer novelas','Lees novelas.'],['PRESENTE DEL INDICATIVO','Ella','cocinar para sus amigos','Cocina para sus amigos.'],['PRESENTE DEL INDICATIVO','Nosotros','aprender idiomas','Aprendemos idiomas.'],['PRESENTE DEL INDICATIVO','Ellos','salir los fines de semana','Salen los fines de semana.'],['PRESENTE DEL INDICATIVO','Yo','hablar con mis vecinos','Hablo con mis vecinos.'],['PRESENTE DEL INDICATIVO','Tú','escribir correos','Escribes correos.'],['PRESENTE DEL INDICATIVO','Ella','abrir una tienda','Abre una tienda.'],['PRESENTE DEL INDICATIVO','Nosotros','compartir piso','Compartimos piso.'],['PRESENTE DEL INDICATIVO','Ellos','vender productos','Venden productos.'],['PRESENTE DEL INDICATIVO','Yo','visitar museos','Visito museos.'],['PRESENTE DEL INDICATIVO','Tú','escuchar música','Escuchas música.'],['PRESENTE DEL INDICATIVO','Ella','preparar una presentación','Prepara una presentación.'],['PRESENTE DEL INDICATIVO','Nosotros','organizar una fiesta','Organizamos una fiesta.'],['PRESENTE DEL INDICATIVO','Ellos','buscar trabajo','Buscan trabajo.'],
['GERUNDIO','Yo','leer → ahora mismo','Estoy leyendo ahora mismo.'],['GERUNDIO','Tú','estudiar → en la biblioteca','Estás estudiando en la biblioteca.'],['GERUNDIO','Ella','cocinar → la cena','Está cocinando la cena.'],['GERUNDIO','Nosotros','trabajar → desde las ocho','Estamos trabajando desde las ocho.'],['GERUNDIO','Ellos','viajar → por Europa','Están viajando por Europa.'],['GERUNDIO','Yo','escribir → un informe','Estoy escribiendo un informe.'],['GERUNDIO','Tú','escuchar → un pódcast','Estás escuchando un pódcast.'],['GERUNDIO','Ella','dormir → en el sofá','Está durmiendo en el sofá.'],['GERUNDIO','Nosotros','preparar → el examen','Estamos preparando el examen.'],['GERUNDIO','Ellos','buscar → un apartamento','Están buscando un apartamento.'],['GERUNDIO','Yo','correr → en el parque','Estoy corriendo en el parque.'],['GERUNDIO','Tú','hablar → por teléfono','Estás hablando por teléfono.'],['GERUNDIO','Ella','aprender → italiano','Está aprendiendo italiano.'],['GERUNDIO','Nosotros','ver → una serie','Estamos viendo una serie.'],['GERUNDIO','Ellos','construir → una casa','Están construyendo una casa.'],['GERUNDIO','Yo','hacer → los deberes','Estoy haciendo los deberes.'],['GERUNDIO','Tú','conducir → al trabajo','Estás conduciendo al trabajo.'],['GERUNDIO','Ella','limpiar → la casa','Está limpiando la casa.'],['GERUNDIO','Nosotros','esperar → el autobús','Estamos esperando el autobús.'],['GERUNDIO','Ellos','bailar → en una fiesta','Están bailando en una fiesta.'],
['PRETÉRITO PERFECTO','Yo','visitar Barcelona','He visitado Barcelona.'],['PRETÉRITO PERFECTO','Tú','terminar el proyecto','Has terminado el proyecto.'],['PRETÉRITO PERFECTO','Ella','encontrar trabajo','Ha encontrado trabajo.'],['PRETÉRITO PERFECTO','Nosotros','reservar un hotel','Hemos reservado un hotel.'],['PRETÉRITO PERFECTO','Ellos','aprender francés','Han aprendido francés.'],['PRETÉRITO PERFECTO','Yo','escribir un artículo','He escrito un artículo.'],['PRETÉRITO PERFECTO','Tú','conocer a una persona famosa','Has conocido a una persona famosa.'],['PRETÉRITO PERFECTO','Ella','comprar un coche','Ha comprado un coche.'],['PRETÉRITO PERFECTO','Nosotros','hacer una excursión','Hemos hecho una excursión.'],['PRETÉRITO PERFECTO','Ellos','abrir una empresa','Han abierto una empresa.'],['PRETÉRITO PERFECTO','Yo','perder las llaves','He perdido las llaves.'],['PRETÉRITO PERFECTO','Tú','cambiar de opinión','Has cambiado de opinión.'],['PRETÉRITO PERFECTO','Ella','preparar una comida especial','Ha preparado una comida especial.'],['PRETÉRITO PERFECTO','Nosotros','ver una película','Hemos visto una película.'],['PRETÉRITO PERFECTO','Ellos','ganar un premio','Han ganado un premio.'],['PRETÉRITO PERFECTO','Yo','participar en un curso','He participado en un curso.'],['PRETÉRITO PERFECTO','Tú','leer ese libro','Has leído ese libro.'],['PRETÉRITO PERFECTO','Ella','viajar al extranjero','Ha viajado al extranjero.'],['PRETÉRITO PERFECTO','Nosotros','solucionar el problema','Hemos solucionado el problema.'],['PRETÉRITO PERFECTO','Ellos','recibir una noticia','Han recibido una noticia.'],
['PRETÉRITO INDEFINIDO','Yo','perder el tren','Perdí el tren.'],['PRETÉRITO INDEFINIDO','Tú','aceptar una oferta','Aceptaste una oferta.'],['PRETÉRITO INDEFINIDO','Ella','cambiar de ciudad','Cambió de ciudad.'],['PRETÉRITO INDEFINIDO','Nosotros','descubrir una solución','Descubrimos una solución.'],['PRETÉRITO INDEFINIDO','Ellos','fundar una empresa','Fundaron una empresa.'],['PRETÉRITO INDEFINIDO','Yo','abandonar el proyecto','Abandoné el proyecto.'],['PRETÉRITO INDEFINIDO','Tú','ganar un concurso','Ganaste un concurso.'],['PRETÉRITO INDEFINIDO','Ella','resolver un conflicto','Resolvió un conflicto.'],['PRETÉRITO INDEFINIDO','Nosotros','superar una crisis','Superamos una crisis.'],['PRETÉRITO INDEFINIDO','Ellos','iniciar una investigación','Iniciaron una investigación.'],['PRETÉRITO INDEFINIDO','Yo','rechazar una propuesta','Rechacé una propuesta.'],['PRETÉRITO INDEFINIDO','Tú','romper una promesa','Rompiste una promesa.'],['PRETÉRITO INDEFINIDO','Ella','invertir en un negocio','Invirtió en un negocio.'],['PRETÉRITO INDEFINIDO','Nosotros','encontrar un error','Encontramos un error.'],['PRETÉRITO INDEFINIDO','Ellos','tomar una decisión','Tomaron una decisión.'],['PRETÉRITO INDEFINIDO','Yo','visitar Roma','Visité Roma.'],['PRETÉRITO INDEFINIDO','Tú','terminar la carrera','Terminaste la carrera.'],['PRETÉRITO INDEFINIDO','Ella','publicar un libro','Publicó un libro.'],['PRETÉRITO INDEFINIDO','Nosotros','organizar el evento','Organizamos el evento.'],['PRETÉRITO INDEFINIDO','Ellos','lanzar un producto','Lanzaron un producto.'],
['FUTURO PRÓXIMO','Yo','viajar a México','Voy a viajar a México.'],['FUTURO PRÓXIMO','Tú','estudiar esta noche','Vas a estudiar esta noche.'],['FUTURO PRÓXIMO','Ella','cambiar de trabajo','Va a cambiar de trabajo.'],['FUTURO PRÓXIMO','Nosotros','comprar una casa','Vamos a comprar una casa.'],['FUTURO PRÓXIMO','Ellos','aprender alemán','Van a aprender alemán.'],['FUTURO PRÓXIMO','Yo','empezar un curso','Voy a empezar un curso.'],['FUTURO PRÓXIMO','Tú','visitar a tus abuelos','Vas a visitar a tus abuelos.'],['FUTURO PRÓXIMO','Ella','preparar una fiesta','Va a preparar una fiesta.'],['FUTURO PRÓXIMO','Nosotros','salir mañana','Vamos a salir mañana.'],['FUTURO PRÓXIMO','Ellos','abrir un restaurante','Van a abrir un restaurante.'],['FUTURO PRÓXIMO','Yo','hacer deporte','Voy a hacer deporte.'],['FUTURO PRÓXIMO','Tú','ver una película','Vas a ver una película.'],['FUTURO PRÓXIMO','Ella','escribir un libro','Va a escribir un libro.'],['FUTURO PRÓXIMO','Nosotros','mudarnos de ciudad','Vamos a mudarnos de ciudad.'],['FUTURO PRÓXIMO','Ellos','lanzar una campaña','Van a lanzar una campaña.'],['FUTURO PRÓXIMO','Yo','conocer a nuevas personas','Voy a conocer a nuevas personas.'],['FUTURO PRÓXIMO','Tú','mejorar tu nivel','Vas a mejorar tu nivel.'],['FUTURO PRÓXIMO','Ella','buscar empleo','Va a buscar empleo.'],['FUTURO PRÓXIMO','Nosotros','organizar un viaje','Vamos a organizar un viaje.'],['FUTURO PRÓXIMO','Ellos','ahorrar dinero','Van a ahorrar dinero.']
].map(([tense,subject,task,answer])=>({tense,subject,task,answer}));
let cards=[...allCards], index=0, answerVisible=false;
function render(){const c=cards[index];tense.textContent=c.tense;subject.textContent=c.subject+' →';task.textContent=c.task;answer.textContent=c.answer;answer.classList.toggle('show',answerVisible);counter.textContent=(index+1)+' / '+cards.length;}
function nextCard(){index=(index+1)%cards.length;answerVisible=false;render();}
function prevCard(){index=(index-1+cards.length)%cards.length;answerVisible=false;render();}
function toggleAnswer(){answerVisible=!answerVisible;render();}
function shuffleCards(){for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]]}index=0;answerVisible=false;render();}
function setFilter(){const value=filter.value;cards=value==='TODOS'?[...allCards]:allCards.filter(c=>c.tense===value);index=0;answerVisible=false;render();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextCard();if(e.key==='ArrowLeft')prevCard();if(e.key===' '||e.key==='Enter'){e.preventDefault();toggleAnswer();}});
render();
</script>
</body>
</html>
