<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Español</title>

<style>
body{
    margin:0;
    padding:40px 20px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,#eef6ff,#f7f9fc);
    color:#1f2937;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:42px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    display:block;
    background:white;
    border-radius:24px;
    padding:28px;
    text-decoration:none;
    color:inherit;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:42px;
    margin-bottom:10px;
}

.title{
    font-size:24px;
    font-weight:700;
    margin-bottom:8px;
}

.desc{
    color:#6b7280;
    line-height:1.5;
}

.back{
    margin-top:30px;
    text-align:center;
}

.back a{
    text-decoration:none;
    color:#2563eb;
    font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<h1>🇪🇸 Español</h1>

<div class="subtitle">

</div>

<div class="grid">

<a class="card" href="tiempos.html">
    <div class="icon">⏳</div>
    <div class="title">Tiempos verbales</div>
    <div class="desc">
        Juegos para practicar los tiempos verbales.
    </div>
</a>

<a class="card" href="adjetivos.html">
    <div class="icon">🎭</div>
    <div class="title">Adjetivos</div>

        ¿Quién o qué soy? Adivina usando descripciones y pistas.
    </div>
</a>

<a class="card" href="#">
    <div class="icon">🎒</div>
    <div class="title">Vocabulario</div>
    <div class="desc">
        Próximamente.
    </div>
</a>

<a class="card" href="#">
    <div class="icon">🎮</div>
    <div class="title">Juegos</div>
    <div class="desc">
        Próximamente.
    </div>
</a>

</div>

<div class="back">
    <a href="../index.html">⬅ Volver a la página principal</a>
</div>

</div>

</html>
