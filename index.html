<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materiały dydaktyczne</title>

<style>
body{
    margin:0;
    padding:40px 20px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,#eef6ff,#f7f9fc);
    color:#1f2937;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:42px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:24px;
    padding:30px;
    text-decoration:none;
    color:inherit;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:48px;
    margin-bottom:15px;
}

.title{
    font-size:28px;
    font-weight:700;
    margin-bottom:10px;
}

.desc{
    color:#6b7280;
    line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 Materiały dydaktyczne</h1>

<div class="subtitle">
Wybierz przedmiot
</div>

<div class="grid">

<a class="card" href="chemia/">
    <div class="icon">🧪</div>
    <div class="title">Chemia</div>
    <div class="desc">
        Reakcje charakterystyczne, mechanizmy reakcji, zadania i gry interaktywne.
    </div>
</a>

<a class="card" href="hiszpański/">
    <div class="icon">🇪🇸</div>
    <div class="title">Hiszpański</div>
    <div class="desc">
        Gry językowe, czasy gramatyczne, słownictwo i materiały interaktywne.
    </div>
</a>

</div>

</div>

</body>
</html>
